<?xml version="1.0" encoding="UTF-8"?>
<!--
  Curved paddle: a 90-degree annular sector whose convex (outward) face
  points to the right. Same art language as the other sprites: white body,
  8px black outline, soft drop shadow.
    - Flared, brighter rounded ends (thicker knobs at each tip).
    - A recessed groove in the centre of the outward face, sized to hold two
      stacked square sprites (2 x 84 tall, borders overlapping by the 8px
      stroke = 160 units of arc length).
  Height ~= 5x the square sprite. Rotate in-engine to aim it at any bearing.
  Geometry generated from exact arc math (see path below).
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 159 478" width="159" height="478">
  <defs>
    <!-- bright at both ends, darker through the recessed centre -->
    <linearGradient id="bodyShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#c4cad6"/>
      <stop offset="1"   stop-color="#ffffff"/>
    </linearGradient>

    <!-- extra gloss pooled on the flared ends -->
    <radialGradient id="endGloss" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- soft drop shadow so the art reads against the playfield -->
    <filter id="shadow" x="-25%" y="-15%" width="150%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <path id="paddle" d="M 74.67,28.00 A 298 298 0 0 1 98.78,55.25 L 84.59,66.33 A 280 280 0 0 1 130.18,151.98 L 105.46,160.03 A 254 254 0 0 1 105.46,317.40 L 130.18,325.46 A 280 280 0 0 1 84.59,411.10 L 98.78,422.18 A 298 298 0 0 1 74.67,449.44 A 33 33 0 0 1 28.00,402.77 A 232 232 0 0 0 28.00,74.67 A 33 33 0 0 1 74.67,28.00 Z"/>
    <clipPath id="clip"><use xlink:href="#paddle"/></clipPath>
  </defs>

  <g filter="url(#shadow)">
    <!-- shaded body -->
    <use xlink:href="#paddle" fill="url(#bodyShade)"/>

    <!-- brighten the two flared ends (kept inside the silhouette) -->
    <g clip-path="url(#clip)">
      <circle cx="51.33" cy="51.33"  r="48" fill="url(#endGloss)"/>
      <circle cx="51.33" cy="426.10" r="48" fill="url(#endGloss)"/>
    </g>

    <!-- crisp outline on top -->
    <use xlink:href="#paddle" fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- rim-light glints along the outer face of each end -->
    <path d="M 75.40,61.30 A 276 276 0 0 1 123.40,144.30" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M 123.40,333.10 A 276 276 0 0 1 75.40,416.10" fill="none" stroke="#ffffff" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round"/>

    <!-- specular sparkle on each end knob -->
    <circle cx="43" cy="43"  r="6" fill="#ffffff" fill-opacity="0.80"/>
    <circle cx="43" cy="434" r="6" fill="#ffffff" fill-opacity="0.80"/>
  </g>
</svg>
