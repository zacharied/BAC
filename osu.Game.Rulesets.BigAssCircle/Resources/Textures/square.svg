<?xml version="1.0" encoding="UTF-8"?>
<!--
  Rounded square tile with a raised, beveled dot in the centre.
  Same art language as arrow.svg: white fill, black outline (matching
  stroke weight), vertical shading, top-edge shine, soft drop shadow.
  Drawn at the same unit scale as the chevron: the tile footprint (~84u)
  is ~60% of the chevron's ~140u width, so they compose at 1:1 scale.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- shared body shading: white highlight down to cool grey -->
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#f1f4f9"/>
      <stop offset="1"    stop-color="#c7cdd8"/>
    </linearGradient>

    <!-- glossy specular fade over the top of the tile -->
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.6"  stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- diagonal light across the dot's bevel: bright top-left, dark bottom-right -->
    <linearGradient id="bevel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#eef1f6"/>
      <stop offset="1"   stop-color="#b3bbc8"/>
    </linearGradient>

    <!-- raised top face of the dot, lit from the top-left -->
    <radialGradient id="dotface" cx="0.4" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dbe1ea"/>
    </radialGradient>

    <!-- soft drop shadow so the art reads against the playfield -->
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <rect id="tile" x="18" y="18" width="84" height="84" rx="14" ry="14"/>
  </defs>

  <g filter="url(#shadow)">
    <!-- tile: base fill, gloss pass, then crisp outline on top -->
    <use href="#tile" fill="url(#shade)"/>
    <use href="#tile" fill="url(#gloss)"/>
    <use href="#tile" fill="none" stroke="#000000" stroke-width="8" stroke-linejoin="round"/>

    <!-- rim-light glints along the top and left edges -->
    <path d="M34,23 L86,23" fill="none" stroke="#ffffff" stroke-opacity="0.80" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M23,34 L23,82" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="3"   stroke-linecap="round"/>

    <!-- beveled centre dot -->
    <circle cx="60" cy="62.5" r="22.5" fill="#000000" fill-opacity="0.12"/>       <!-- contact shadow -->
    <circle cx="60" cy="60"   r="22"   fill="url(#bevel)" stroke="#000000" stroke-width="3.5"/> <!-- bevel ring -->
    <circle cx="60" cy="60"   r="13.5" fill="url(#dotface)"/>                       <!-- raised top face -->
    <ellipse cx="53" cy="52" rx="6.5" ry="3.6" fill="#ffffff" fill-opacity="0.85"
             transform="rotate(-35 53 52)"/>                                        <!-- specular glint -->
  </g>
</svg>
